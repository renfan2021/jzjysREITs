<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>jzjysREITs</title>
    <style>
      html,
      body,
      iframe {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      iframe {
        display: block;
        border: 0;
      }
    </style>
  </head>
  <body>
    <iframe id="appFrame" title="jzjysREITs" src="../index.html"></iframe>
    <script>
      const frame = document.getElementById("appFrame");
      const syncFrame = () => {
        frame.src = "../index.html" + window.location.hash;
      };
      syncFrame();
      window.addEventListener("hashchange", syncFrame);
    </script>
  </body>
</html>
